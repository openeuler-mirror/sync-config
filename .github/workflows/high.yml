name: openEuler high priority mirror periodic job

on:
  pull_request:
    # Runs at every pull requests submitted in master branch 
    branches: [ master ]
    paths:
    - '.github/workflows/**'
  schedule:
    # Runs every 2 hours, starting at 01:00.
    - cron:  '0 1/1 * * *'

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      PIP_BREAK_SYSTEM_PACKAGES: "1"
    
    steps:
    - name: Mirror the gitcode/openeuler org repos to github/openeuler-mirror.
      uses: Yikun/hub-mirror-action@master
      with:
        src: gitcode/openeuler
        dst: github/openeuler-mirror
        dst_key: ${{ secrets.SYNC_EULER_PRIVATE_KEY }}
        dst_token:  ${{ secrets.SYNC_EULER_TOKEN }}
        account_type: org
        clone_style: ssh
        force_update: true
        debug: true
        static_list: "stratovirt"
