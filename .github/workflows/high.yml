name: openEuler high priority mirror periodic job

on:
  workflow_dispatch:
  pull_request:
    branches: [ master ]
    paths:
    - '.github/workflows/**'
  schedule:
    - cron: '0 1/2 * * *'

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout community-mirror (scripts)
      uses: actions/checkout@v4
      with:
        repository: huanglei0308/community-mirror
        path: _mirror-hub

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install gitpython requests -q

    - name: Mirror high-priority repos
      id: mirror
      continue-on-error: true
      run: |
        python _mirror-hub/scripts/mirror_repos.py \
          --src gitcode/openeuler \
          --dst github/openeuler-mirror \
          --dst-token "${{ secrets.SYNC_EULER_TOKEN }}" \
          --dst-key "${{ secrets.SYNC_EULER_PRIVATE_KEY }}" \
          --account-type org \
          --static-list "stratovirt" \
          --force-update \
          --clone-style ssh \
          --workflow high \
          --output results.json

    - name: Diagnose failures
      continue-on-error: true
      run: |
        python _mirror-hub/scripts/diagnose_failures.py results.json \
          --src gitcode/openeuler \
          --dst github/openeuler-mirror \
          --dst-token "${{ secrets.SYNC_EULER_TOKEN }}" \
          --account-type org

    - name: Merge with existing results on gh-pages
      run: |
        REPO=$(echo "${{ github.repository }}" | cut -d/ -f2)
        MERGE_URL="https://${{ github.repository_owner }}.github.io/${REPO}/results.json"
        python _mirror-hub/scripts/merge_results.py results.json \
          --merge-url "$MERGE_URL" \
          --output results.json

    - name: Prepare publish directory
      run: |
        rm -rf _mirror-hub _publish
        mkdir _publish
        cp results.json _publish/

    - name: Deploy results to gh-pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: _publish
        publish_branch: gh-pages
        keep_files: false
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Update sync results [skip ci]'
