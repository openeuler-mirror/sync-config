name: Openeuler gitcode repos mirror periodic job

on:
  workflow_dispatch:
  pull_request:
    branches: [ master ]
    paths:
    - '.github/workflows/**'
  schedule:
    - cron: '0 1 * * *'

jobs:
  # ── Job 1: Fetch repo list from source API and split into batches ──
  prepare:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.split.outputs.batches }}
    steps:
    - name: Checkout community-mirror (scripts)
      uses: actions/checkout@v4
      with:
        repository: huanglei0308/community-mirror
        path: _mirror-hub

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Fetch repos and split into batches
      id: split
      run: |
        pip install requests -q
        python _mirror-hub/scripts/split_batches.py \
          --src gitcode/openeuler \
          --src-token "${{ secrets.SYNC_GITCODE_TOKEN }}" \
          --account-type org \
          --black-list "kernel,qemu,raspberrypi,raspberrypi-kernel,website-v2" \
          --batch-size 80

    - name: Snapshot destination repos (pre-mirror)
      run: |
        python _mirror-hub/scripts/snapshot_dst.py \
          --dst github/openeuler-mirror \
          --dst-token "${{ secrets.SYNC_EULER_TOKEN }}" \
          --account-type org \
          --output pre_dst.json

    - name: Upload pre-mirror snapshot
      uses: actions/upload-artifact@v4
      with:
        name: pre-dst-snapshot
        path: pre_dst.json
        retention-days: 1

  # ── Job 2: Mirror each batch in parallel (matrix) ──
  mirror:
    needs: prepare
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        batch_list: ${{ fromJSON(needs.prepare.outputs.batches) }}
    steps:
    - name: Mirror batch
      id: mirror
      continue-on-error: true
      uses: Yikun/hub-mirror-action@master
      with:
        src: gitcode/openeuler
        dst: github/openeuler-mirror
        src_token: ${{ secrets.SYNC_GITCODE_TOKEN }}
        dst_key: ${{ secrets.SYNC_EULER_PRIVATE_KEY }}
        dst_token: ${{ secrets.SYNC_EULER_TOKEN }}
        account_type: org
        clone_style: ssh
        force_update: true
        debug: true
        static_list: ${{ matrix.batch_list }}
        # lfs: true   ← 去掉 — 800 个仓库大部分不需要 LFS，
        #                真有 LFS 需求单独建 workflow 处理

    - name: Verify sync by comparing HEAD commits
      if: always()
      run: |
        PUSH_FAILED="[]"
        SUCCESS="[]"
        for repo in $(echo '${{ matrix.batch_list }}' | tr ',' ' '); do
          src_head=$(git ls-remote git@gitcode.com:openeuler/$repo.git HEAD 2>/dev/null | cut -f1)
          dst_head=$(git ls-remote git@github.com:openeuler-mirror/$repo.git HEAD 2>/dev/null | cut -f1)
          if [ -z "$dst_head" ]; then
            # Repo doesn't exist on destination → definitely failed
            PUSH_FAILED=$(echo "$PUSH_FAILED" | jq -c ". + [\"$repo\"]")
          elif [ -n "$src_head" ] && [ "$src_head" = "$dst_head" ]; then
            # HEAD matches → synced successfully (or already up-to-date)
            SUCCESS=$(echo "$SUCCESS" | jq -c ". + [\"$repo\"]")
          else
            # HEAD differs → push failed or incomplete
            PUSH_FAILED=$(echo "$PUSH_FAILED" | jq -c ". + [\"$repo\"]")
          fi
        done
        jq -n \
          --argjson push_failed "$PUSH_FAILED" \
          --argjson success "$SUCCESS" \
          '{push_failed: $push_failed, failed_count: ($push_failed | length),
            success: $success, success_count: ($success | length)}' \
          > batch_report.json
        echo "✅ Synced: $(echo "$SUCCESS" | jq length)"
        echo "❌ Push failed: $(echo "$PUSH_FAILED" | jq length)"

    - name: Upload batch report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: batch-report-${{ strategy.job-index }}
        path: batch_report.json
        retention-days: 1

  # ── Job 3: Aggregate results, update README, deploy gh-pages ──
  aggregate:
    needs: mirror
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout sync-config
      uses: actions/checkout@v4

    - name: Checkout community-mirror (scripts)
      uses: actions/checkout@v4
      with:
        repository: huanglei0308/community-mirror
        path: _mirror-hub

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Check sync status (all repos)
      id: status
      continue-on-error: true
      run: |
        pip install requests -q
        python _mirror-hub/scripts/check_sync_status.py \
          --src gitcode/openeuler \
          --dst github/openeuler-mirror \
          --src-token "${{ secrets.SYNC_GITCODE_TOKEN }}" \
          --dst-token "${{ secrets.SYNC_EULER_TOKEN }}" \
          --account-type org \
          --black-list "kernel,qemu,raspberrypi,raspberrypi-kernel,website-v2" \
          --workflow-name "repo-mirror" \
          --output results.json

    - name: Diagnose failures
      continue-on-error: true
      run: |
        python _mirror-hub/scripts/diagnose_failures.py results.json \
          --src gitcode/openeuler \
          --dst github/openeuler-mirror \
          --src-token "${{ secrets.SYNC_GITCODE_TOKEN }}" \
          --dst-token "${{ secrets.SYNC_EULER_TOKEN }}" \
          --account-type org

    - name: Merge with existing results on gh-pages
      run: |
        REPO=$(echo "${{ github.repository }}" | cut -d/ -f2)
        MERGE_URL="https://${{ github.repository_owner }}.github.io/${REPO}/results.json"
        echo "Merging with: $MERGE_URL"
        python _mirror-hub/scripts/merge_results.py results.json \
          --merge-url "$MERGE_URL" \
          --output results.json

    - name: Download pre-mirror snapshot
      uses: actions/download-artifact@v4
      with:
        name: pre-dst-snapshot

    - name: Diff pre vs post mirror
      run: |
        python3 << PYEOF
        import json

        with open("results.json") as f:
            results = json.load(f)
        with open("pre_dst.json") as f:
            pre_dst = set(json.load(f))

        new_list = [r for r in results["success_list"] if r not in pre_dst]
        existing_list = [r for r in results["success_list"] if r in pre_dst]

        results["new_list"] = new_list
        results["existing_list"] = existing_list
        results["new_count"] = len(new_list)
        results["existing_count"] = len(existing_list)

        with open("results.json", "w") as f:
            json.dump(results, f, indent=2, ensure_ascii=False)

        print(f"✅ Newly synced (this run):  {len(new_list)}")
        print(f"📦 Already existed before:   {len(existing_list)}")
        print(f"❌ Still failed:             {results['failed']}")
        print(f"⏭️ Skipped (black_list etc): {results['skipped']}")
        PYEOF

    - name: Download batch reports
      uses: actions/download-artifact@v4
      with:
        pattern: batch-report-*
        path: batch-reports

    - name: Merge batch reports into results
      run: |
        python3 << PYEOF
        import json, glob

        with open("results.json") as f:
            results = json.load(f)

        batch_push_failed = []  # repos where HEADs differ → push failed
        batch_verified = 0     # repos checked by batch reports
        batch_error_count = 0   # batches with any push_failed

        for report_file in sorted(glob.glob("batch-reports/batch-report-*/batch_report.json")):
            with open(report_file) as f:
                report = json.load(f)
            for repo in report.get("push_failed", []):
                if repo not in batch_push_failed:
                    batch_push_failed.append(repo)
            batch_verified += report.get("success_count", 0) + report.get("failed_count", 0)
            if report.get("failed_count", 0) > 0:
                batch_error_count += 1

        # Merge: batch-level push_failed is authoritative
        # Also keep check_sync_status failures that batch reports didn't verify
        api_failed = set(results.get("failed_list", []))
        batch_failed_set = set(batch_push_failed)

        # Remove repos that batch reports verified as success
        for report_file in sorted(glob.glob("batch-reports/batch-report-*/batch_report.json")):
            with open(report_file) as f:
                report = json.load(f)
            for repo in report.get("success", []):
                api_failed.discard(repo)

        # Union: API failures + batch-detected push failures
        all_failed = api_failed | batch_failed_set

        results["failed_list"] = sorted(all_failed)
        results["failed"] = len(results["failed_list"])
        results["push_failed_list"] = sorted(batch_push_failed)
        results["push_failed_count"] = len(batch_push_failed)
        results["batch_reports_count"] = len(glob.glob("batch-reports/batch-report-*/batch_report.json"))
        results["batch_verified"] = batch_verified

        with open("results.json", "w") as f:
            json.dump(results, f, indent=2, ensure_ascii=False)

        print(f"📋 {results['batch_reports_count']} batch reports, {batch_verified} repos verified")
        print(f"❌ Push failed (HEAD mismatch): {results['push_failed_count']}")
        print(f"❌ API failed (missing from dest): {len(api_failed)}")
        print(f"❌ Total failed: {results['failed']}")
        PYEOF

    - name: Update README with sync status
      run: python update_readme.py

    - name: Commit and push updated README
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git add README.md
        if git diff --cached --quiet; then
          echo "No changes to README"
        else
          git commit -m "Update sync status [skip ci]"
          git pull --rebase
          git push
        fi

    - name: Prepare publish directory
      run: |
        rm -rf _mirror-hub _publish
        mkdir _publish
        cp results.json _publish/

    - name: Deploy results to gh-pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: _publish
        publish_branch: gh-pages
        keep_files: false
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Update sync results [skip ci]'
