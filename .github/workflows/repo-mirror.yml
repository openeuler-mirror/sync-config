name: Openeuler gitcode repos mirror periodic job

on:
  workflow_dispatch:
  pull_request:
    branches: [ master ]
    paths:
    - '.github/workflows/**'
  schedule:
    - cron: '0 1 * * *'

jobs:
  # ── Job 1: Fetch repo list from source API and split into batches ──
  prepare:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.split.outputs.batches }}
    steps:
    - name: Checkout community-mirror (scripts)
      uses: actions/checkout@v4
      with:
        repository: huanglei0308/community-mirror
        path: _mirror-hub

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Fetch repos and split into batches
      id: split
      run: |
        pip install requests -q
        python _mirror-hub/scripts/split_batches.py \
          --src gitcode/openeuler \
          --src-token "${{ secrets.SYNC_GITCODE_TOKEN }}" \
          --account-type org \
          --black-list "kernel,qemu,raspberrypi,raspberrypi-kernel,website-v2" \
          --batch-size 80

    - name: Snapshot destination repos (pre-mirror)
      run: |
        python _mirror-hub/scripts/snapshot_dst.py \
          --dst github/openeuler-mirror \
          --dst-token "${{ secrets.SYNC_EULER_TOKEN }}" \
          --account-type org \
          --output pre_dst.json

    - name: Upload pre-mirror snapshot
      uses: actions/upload-artifact@v4
      with:
        name: pre-dst-snapshot
        path: pre_dst.json
        retention-days: 1

  # ── Job 2: Mirror each batch in parallel (matrix) ──
  mirror:
    needs: prepare
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        batch_list: ${{ fromJSON(needs.prepare.outputs.batches) }}
    steps:
    - name: Mirror batch
      continue-on-error: true
      uses: Yikun/hub-mirror-action@master
      with:
        src: gitcode/openeuler
        dst: github/openeuler-mirror
        src_token: ${{ secrets.SYNC_GITCODE_TOKEN }}
        dst_key: ${{ secrets.SYNC_EULER_PRIVATE_KEY }}
        dst_token: ${{ secrets.SYNC_EULER_TOKEN }}
        account_type: org
        clone_style: ssh
        force_update: true
        debug: true
        static_list: ${{ matrix.batch_list }}
        # lfs: true   ← 去掉 — 800 个仓库大部分不需要 LFS，
        #                真有 LFS 需求单独建 workflow 处理

  # ── Job 3: Aggregate results, update README, deploy gh-pages ──
  aggregate:
    needs: mirror
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout sync-config
      uses: actions/checkout@v4

    - name: Checkout community-mirror (scripts)
      uses: actions/checkout@v4
      with:
        repository: huanglei0308/community-mirror
        path: _mirror-hub

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Check sync status (all repos)
      id: status
      continue-on-error: true
      run: |
        pip install requests -q
        python _mirror-hub/scripts/check_sync_status.py \
          --src gitcode/openeuler \
          --dst github/openeuler-mirror \
          --src-token "${{ secrets.SYNC_GITCODE_TOKEN }}" \
          --dst-token "${{ secrets.SYNC_EULER_TOKEN }}" \
          --account-type org \
          --black-list "kernel,qemu,raspberrypi,raspberrypi-kernel,website-v2" \
          --workflow-name "repo-mirror" \
          --output results.json

    - name: Diagnose failures
      continue-on-error: true
      run: |
        python _mirror-hub/scripts/diagnose_failures.py results.json \
          --src gitcode/openeuler \
          --dst github/openeuler-mirror \
          --src-token "${{ secrets.SYNC_GITCODE_TOKEN }}" \
          --dst-token "${{ secrets.SYNC_EULER_TOKEN }}" \
          --account-type org

    - name: Merge with existing results on gh-pages
      run: |
        REPO=$(echo "${{ github.repository }}" | cut -d/ -f2)
        MERGE_URL="https://${{ github.repository_owner }}.github.io/${REPO}/results.json"
        echo "Merging with: $MERGE_URL"
        python _mirror-hub/scripts/merge_results.py results.json \
          --merge-url "$MERGE_URL" \
          --output results.json

    - name: Download pre-mirror snapshot
      uses: actions/download-artifact@v4
      with:
        name: pre-dst-snapshot

    - name: Diff pre vs post mirror
      run: |
        python3 << PYEOF
        import json

        with open("results.json") as f:
            results = json.load(f)
        with open("pre_dst.json") as f:
            pre_dst = set(json.load(f))

        new_list = [r for r in results["success_list"] if r not in pre_dst]
        existing_list = [r for r in results["success_list"] if r in pre_dst]

        results["new_list"] = new_list
        results["existing_list"] = existing_list
        results["new_count"] = len(new_list)
        results["existing_count"] = len(existing_list)

        with open("results.json", "w") as f:
            json.dump(results, f, indent=2, ensure_ascii=False)

        print(f"✅ Newly synced (this run):  {len(new_list)}")
        print(f"📦 Already existed before:   {len(existing_list)}")
        print(f"❌ Still failed:             {results['failed']}")
        print(f"⏭️ Skipped (black_list etc): {results['skipped']}")
        PYEOF

    - name: Update README with sync status
      run: python update_readme.py

    - name: Commit and push updated README
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git add README.md
        if git diff --cached --quiet; then
          echo "No changes to README"
        else
          git commit -m "Update sync status [skip ci]"
          git pull --rebase
          git push
        fi

    - name: Prepare publish directory
      run: |
        rm -rf _mirror-hub _publish
        mkdir _publish
        cp results.json _publish/

    - name: Deploy results to gh-pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: _publish
        publish_branch: gh-pages
        keep_files: false
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Update sync results [skip ci]'
