name: Openeuler gitcode repos mirror periodic job

on:
  workflow_dispatch:
  pull_request:
    branches: [ master ]
    paths:
    - '.github/workflows/**'
  schedule:
    - cron: '0 1 * * *'

jobs:
  # ── Job 1: Fetch repo list from source API and split into batches ──
  prepare:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.split.outputs.batches }}
    steps:
    - name: Checkout community-mirror (scripts)
      uses: actions/checkout@v4
      with:
        repository: huanglei0308/community-mirror
        path: _mirror-hub

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Fetch repos and split into batches
      id: split
      run: |
        pip install requests -q
        python _mirror-hub/scripts/split_batches.py \
          --src gitcode/openeuler \
          --src-token "${{ secrets.SYNC_GITCODE_TOKEN }}" \
          --account-type org \
          --black-list "kernel,qemu,raspberrypi,raspberrypi-kernel,website-v2" \
          --batch-size 80

  # ── Job 2: Mirror each batch in parallel (matrix) ──
  mirror:
    name: mirror-batch-${{ strategy.job-index }}
    needs: prepare
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        batch_list: ${{ fromJSON(needs.prepare.outputs.batches) }}
    steps:
    - name: Checkout community-mirror (scripts)
      uses: actions/checkout@v4
      with:
        repository: huanglei0308/community-mirror
        path: _mirror-hub

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install gitpython requests -q

    - name: Mirror batch
      id: mirror
      continue-on-error: true
      run: |
        python _mirror-hub/scripts/mirror_repos.py \
          --src gitcode/openeuler \
          --dst github/openeuler-mirror \
          --src-token "${{ secrets.SYNC_GITCODE_TOKEN }}" \
          --dst-token "${{ secrets.SYNC_EULER_TOKEN }}" \
          --dst-key "${{ secrets.SYNC_EULER_PRIVATE_KEY }}" \
          --account-type org \
          --static-list "${{ matrix.batch_list }}" \
          --force-update \
          --clone-style ssh \
          --workflow repo-mirror \
          --output batch_results.json

    - name: Upload batch results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: batch-results-${{ strategy.job-index }}
        path: batch_results.json
        retention-days: 1

  # ── Job 3: Aggregate results, update README, commit to main ──
  aggregate:
    needs: mirror
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout sync-config
      uses: actions/checkout@v4

    - name: Checkout community-mirror (scripts)
      uses: actions/checkout@v4
      with:
        repository: huanglei0308/community-mirror
        path: _mirror-hub

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Download all batch results
      uses: actions/download-artifact@v4
      with:
        pattern: batch-results-*
        path: batch-results

    - name: Merge batch results into one results.json
      run: |
        python3 << PYEOF
        import json, glob, os

        results = {
            "src": "gitcode/openeuler",
            "dst": "github/openeuler-mirror",
            "workflow": "repo-mirror",
            "total": 0, "success": 0, "failed": 0, "skipped": 0,
            "success_list": [], "failed_list": [], "skipped_list": [],
            "errors": {},
        }

        for f in sorted(glob.glob("batch-results/batch-results-*/batch_results.json")):
            with open(f) as fp:
                b = json.load(fp)
            results["total"] += b.get("total", 0)
            results["success"] += b.get("success", 0)
            results["failed"] += b.get("failed", 0)
            results["skipped"] += b.get("skipped", 0)
            results["success_list"].extend(b.get("success_list", []))
            results["failed_list"].extend(b.get("failed_list", []))
            results["skipped_list"].extend(b.get("skipped_list", []))
            results["errors"].update(b.get("errors", {}))

        results["timestamp"] = __import__("time").strftime(
            "%Y-%m-%dT%H:%M:%SZ", __import__("time").gmtime())

        with open("results.json", "w") as f:
            json.dump(results, f, indent=2, ensure_ascii=False)

        print(f"Total: {results['total']} = "
              f"S:{results['success']} + F:{results['failed']} + Sk:{results['skipped']}")
        PYEOF

    - name: Diagnose failures
      continue-on-error: true
      run: |
        pip install requests -q
        python _mirror-hub/scripts/diagnose_failures.py results.json \
          --src gitcode/openeuler \
          --dst github/openeuler-mirror \
          --src-token "${{ secrets.SYNC_GITCODE_TOKEN }}" \
          --dst-token "${{ secrets.SYNC_EULER_TOKEN }}" \
          --account-type org

    - name: Merge with existing results
      run: |
        BRANCH=$(git rev-parse --abbrev-ref HEAD)
        MERGE_URL="https://raw.githubusercontent.com/${{ github.repository }}/${BRANCH}/results.json"
        echo "Merging with: $MERGE_URL"
        python _mirror-hub/scripts/merge_results.py results.json \
          --merge-url "$MERGE_URL" \
          --output results.json

    - name: Update README with sync status
      env:
        HUB_COMMUNITY: "openEuler"
      run: python update_readme.py

    - name: Commit and push
      env:
        HUB_COMMUNITY: "openEuler"
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'

        BRANCH=$(git rev-parse --abbrev-ref HEAD)
        MERGE_URL="https://raw.githubusercontent.com/${{ github.repository }}/${BRANCH}/results.json"

        for attempt in 1 2 3; do
          # Stash our changes, pull latest, then restore
          git stash push -- README.md results.json 2>/dev/null || true
          git pull --rebase origin "$BRANCH" || { echo "Pull failed"; git rebase --abort 2>/dev/null; break; }
          git stash pop 2>/dev/null || true

          # Resolve any conflict in results.json by re-merging with latest remote
          git checkout --theirs results.json 2>/dev/null || true
          git checkout --theirs README.md 2>/dev/null || true
          git reset HEAD results.json README.md 2>/dev/null
          git checkout -- results.json README.md 2>/dev/null || true

          python _mirror-hub/scripts/merge_results.py results.json \
            --merge-url "$MERGE_URL" \
            --output results.json
          python update_readme.py

          git add README.md results.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update sync status [skip ci]"

          # Try push; if rejected, loop and retry
          if git push origin "$BRANCH"; then
            break
          fi
          echo "Push failed (attempt $attempt), retrying..."
          git reset --soft HEAD~1
        done
