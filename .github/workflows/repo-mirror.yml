name: Openeuler gitcode repos mirror periodic job

on:
  workflow_dispatch:
  pull_request:
    branches: [ master ]
    paths:
    - '.github/workflows/**'
  schedule:
    - cron: '0 1 * * *'

jobs:
  # ── Job 1: Fetch repo list from source API and split into batches ──
  prepare:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.split.outputs.batches }}
    steps:
    - name: Checkout community-mirror (scripts)
      uses: actions/checkout@v4
      with:
        repository: huanglei0308/community-mirror
        path: _mirror-hub

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Fetch repos and split into batches
      id: split
      run: |
        pip install requests -q
        python _mirror-hub/scripts/split_batches.py \
          --src gitcode/openeuler \
          --src-token "${{ secrets.SYNC_GITCODE_TOKEN }}" \
          --account-type org \
          --black-list "kernel,qemu,raspberrypi,raspberrypi-kernel,website-v2" \
          --batch-size 80

  # ── Job 2: Mirror each batch in parallel (matrix) ──
  mirror:
    name: mirror-batch-${{ strategy.job-index }}
    needs: prepare
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      actions: read          # needed to download own log via API
    strategy:
      fail-fast: false
      matrix:
        batch_list: ${{ fromJSON(needs.prepare.outputs.batches) }}
    steps:
    - name: Mirror batch
      id: mirror
      continue-on-error: true
      uses: Yikun/hub-mirror-action@master
      with:
        src: gitcode/openeuler
        dst: github/openeuler-mirror
        src_token: ${{ secrets.SYNC_GITCODE_TOKEN }}
        dst_key: ${{ secrets.SYNC_EULER_PRIVATE_KEY }}
        dst_token: ${{ secrets.SYNC_EULER_TOKEN }}
        account_type: org
        clone_style: ssh
        force_update: true
        debug: true
        static_list: ${{ matrix.batch_list }}
        # lfs: true   ← 去掉 — 800 个仓库大部分不需要 LFS，
        #                真有 LFS 需求单独建 workflow 处理

    - name: Extract sync results from log
      if: always()
      run: |
        # Find this job's ID by name, download its log, parse hub-mirror-action output
        JOB_NAME="mirror-batch-${{ strategy.job-index }}"
        echo "Finding job: $JOB_NAME"

        JOB_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
          | jq -r ".jobs[] | select(.name == \"$JOB_NAME\") | .id")

        echo "Job ID: $JOB_ID"

        # Download this job's raw log
        curl -s -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/actions/jobs/$JOB_ID/logs" \
          > job_log.txt

        echo "Log downloaded: $(wc -c < job_log.txt) bytes"

        # Extract hub-mirror-action's own summary line
        TOTAL_LINE=$(grep "INFO:hubmirror:Total:" job_log.txt | tail -1)
        FAILED_LINE=$(grep "INFO:hubmirror:Failed:" job_log.txt | tail -1)

        echo "=== hub-mirror-action results ==="
        echo "$TOTAL_LINE"
        echo "$FAILED_LINE"

        # Parse "INFO:hubmirror:Failed: ['repo1', 'repo2', ...]"
        if [ -n "$FAILED_LINE" ]; then
          FAILED_JSON=$(echo "$FAILED_LINE" \
            | sed 's/.*Failed: //' \
            | sed "s/'/\"/g" \
            | jq -c '.')
        else
          FAILED_JSON="[]"
        fi

        jq -n \
          --argjson failed "$FAILED_JSON" \
          '{failed: $failed, failed_count: ($failed | length)}' \
          > batch_report.json

        echo "❌ Failed: $(jq -r .failed_count batch_report.json)"
        jq -r '.failed[]' batch_report.json 2>/dev/null | while read repo; do
          echo "   - $repo"
        done

    - name: Upload batch report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: batch-report-${{ strategy.job-index }}
        path: batch_report.json
        retention-days: 1

  # ── Job 3: Aggregate results, update README, deploy gh-pages ──
  aggregate:
    needs: mirror
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout sync-config
      uses: actions/checkout@v4

    - name: Checkout community-mirror (scripts)
      uses: actions/checkout@v4
      with:
        repository: huanglei0308/community-mirror
        path: _mirror-hub

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Check sync status (all repos)
      id: status
      continue-on-error: true
      run: |
        pip install requests -q
        python _mirror-hub/scripts/check_sync_status.py \
          --src gitcode/openeuler \
          --dst github/openeuler-mirror \
          --src-token "${{ secrets.SYNC_GITCODE_TOKEN }}" \
          --dst-token "${{ secrets.SYNC_EULER_TOKEN }}" \
          --account-type org \
          --black-list "kernel,qemu,raspberrypi,raspberrypi-kernel,website-v2" \
          --workflow-name "repo-mirror" \
          --output results.json

    - name: Merge with existing results on gh-pages
      run: |
        REPO=$(echo "${{ github.repository }}" | cut -d/ -f2)
        MERGE_URL="https://${{ github.repository_owner }}.github.io/${REPO}/results.json"
        echo "Merging with: $MERGE_URL"
        python _mirror-hub/scripts/merge_results.py results.json \
          --merge-url "$MERGE_URL" \
          --output results.json

    - name: Download batch reports
      uses: actions/download-artifact@v4
      with:
        pattern: batch-report-*
        path: batch-reports

    - name: Merge batch reports into results
      run: |
        python3 << PYEOF
        import json, glob

        with open("results.json") as f:
            results = json.load(f)

        # Collect failures directly from hub-mirror-action logs
        log_failed = []
        for report_file in sorted(glob.glob("batch-reports/batch-report-*/batch_report.json")):
            with open(report_file) as f:
                report = json.load(f)
            for repo in report.get("failed", []):
                if repo not in log_failed:
                    log_failed.append(repo)

        # Union: API-detected failures + log-extracted failures
        api_failed = set(results.get("failed_list", []))
        all_failed = api_failed | set(log_failed)

        results["failed_list"] = sorted(all_failed)
        results["failed"] = len(results["failed_list"])
        results["log_failed_list"] = sorted(log_failed)
        results["log_failed_count"] = len(log_failed)
        results["batch_reports"] = len(glob.glob("batch-reports/batch-report-*/batch_report.json"))

        with open("results.json", "w") as f:
            json.dump(results, f, indent=2, ensure_ascii=False)

        print(f"📋 {results['batch_reports']} batch reports collected")
        print(f"❌ hub-mirror-action reported: {results['log_failed_count']}")
        print(f"❌ API detected missing: {len(api_failed)}")
        print(f"❌ Total failed (merged): {results['failed']}")
        PYEOF

    - name: Diagnose failures (all sources)
      continue-on-error: true
      run: |
        python _mirror-hub/scripts/diagnose_failures.py results.json \
          --src gitcode/openeuler \
          --dst github/openeuler-mirror \
          --src-token "${{ secrets.SYNC_GITCODE_TOKEN }}" \
          --dst-token "${{ secrets.SYNC_EULER_TOKEN }}" \
          --account-type org

    - name: Update README with sync status
      run: python update_readme.py

    - name: Commit and push updated README
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git add README.md
        if git diff --cached --quiet; then
          echo "No changes to README"
        else
          git commit -m "Update sync status [skip ci]"
          git pull --rebase
          git push
        fi

    - name: Prepare publish directory
      run: |
        rm -rf _mirror-hub _publish
        mkdir _publish
        cp results.json _publish/

    - name: Deploy results to gh-pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: _publish
        publish_branch: gh-pages
        keep_files: false
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Update sync results [skip ci]'
