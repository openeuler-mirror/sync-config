name: Openeuler gitcode large repos mirror periodic job

on:
  workflow_dispatch:
  pull_request:
    branches: [ master ]
    paths:
    - '.github/workflows/**'
  schedule:
    - cron: '0 1 * * *'

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout sync-config
      uses: actions/checkout@v4

    - name: Checkout community-mirror (scripts)
      uses: actions/checkout@v4
      with:
        repository: huanglei0308/community-mirror
        path: _mirror-hub

    - name: Mirror large repos
      id: mirror
      continue-on-error: true
      uses: Yikun/hub-mirror-action@master
      with:
        src: gitcode/openeuler
        dst: github/openeuler-mirror
        dst_key: ${{ secrets.SYNC_EULER_PRIVATE_KEY }}
        dst_token: ${{ secrets.SYNC_EULER_TOKEN }}
        account_type: org
        clone_style: ssh
        force_update: true
        debug: true
        timeout: '1h'
        static_list: "kernel,qemu,raspberrypi,raspberrypi-kernel,website-v2"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Check sync status
      id: status
      continue-on-error: true
      run: |
        pip install requests -q
        python _mirror-hub/scripts/check_sync_status.py \
          --src gitcode/openeuler \
          --dst github/openeuler-mirror \
          --dst-token "${{ secrets.SYNC_EULER_TOKEN }}" \
          --account-type org \
          --static-list "kernel,qemu,raspberrypi,raspberrypi-kernel,website-v2" \
          --workflow-name "large-repo-mirror" \
          --output results.json

    - name: Diagnose failures
      continue-on-error: true
      run: |
        python _mirror-hub/scripts/diagnose_failures.py results.json \
          --src gitcode/openeuler \
          --dst github/openeuler-mirror \
          --dst-token "${{ secrets.SYNC_EULER_TOKEN }}" \
          --account-type org

    - name: Merge with existing results on gh-pages
      run: |
        REPO=$(echo "${{ github.repository }}" | cut -d/ -f2)
        MERGE_URL="https://${{ github.repository_owner }}.github.io/${REPO}/results.json"
        echo "Merging with: $MERGE_URL"
        python _mirror-hub/scripts/merge_results.py results.json \
          --merge-url "$MERGE_URL" \
          --output results.json

    - name: Update README with sync status
      run: python update_readme.py

    - name: Commit and push updated README
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git add README.md
        if git diff --cached --quiet; then
          echo "No changes to README"
        else
          git commit -m "Update sync status [skip ci]"
          git pull --rebase
          git push
        fi

    - name: Prepare publish directory
      run: |
        rm -rf _mirror-hub _publish
        mkdir _publish
        cp results.json _publish/

    - name: Deploy results to gh-pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: _publish
        publish_branch: gh-pages
        keep_files: false
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Update sync results [skip ci]'
