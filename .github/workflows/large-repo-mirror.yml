name: Openeuler gitcode large repos mirror periodic job

on:
  workflow_dispatch:
  pull_request:
    branches: [ master ]
    paths:
    - '.github/workflows/**'
  schedule:
    - cron: '0 1 * * *'

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout sync-config
      uses: actions/checkout@v4

    - name: Checkout community-mirror (scripts)
      uses: actions/checkout@v4
      with:
        repository: huanglei0308/community-mirror
        path: _mirror-hub

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install gitpython requests -q

    - name: Mirror large repos
      id: mirror
      continue-on-error: true
      run: |
        python _mirror-hub/scripts/mirror_repos.py \
          --src gitcode/openeuler \
          --dst github/openeuler-mirror \
          --dst-token "${{ secrets.SYNC_EULER_TOKEN }}" \
          --dst-key "${{ secrets.SYNC_EULER_PRIVATE_KEY }}" \
          --account-type org \
          --static-list "kernel,qemu,raspberrypi,raspberrypi-kernel,website-v2" \
          --force-update \
          --clone-style ssh \
          --timeout 1h \
          --workflow large-repo-mirror \
          --output results.json

    - name: Diagnose failures
      continue-on-error: true
      run: |
        python _mirror-hub/scripts/diagnose_failures.py results.json \
          --src gitcode/openeuler \
          --dst github/openeuler-mirror \
          --dst-token "${{ secrets.SYNC_EULER_TOKEN }}" \
          --account-type org

    - name: Merge with existing results
      run: |
        BRANCH=$(git rev-parse --abbrev-ref HEAD)
        MERGE_URL="https://raw.githubusercontent.com/${{ github.repository }}/${BRANCH}/results.json"
        python _mirror-hub/scripts/merge_results.py results.json \
          --merge-url "$MERGE_URL" \
          --output results.json

    - name: Commit and push
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'

        BRANCH=$(git rev-parse --abbrev-ref HEAD)
        MERGE_URL="https://raw.githubusercontent.com/${{ github.repository }}/${BRANCH}/results.json"

        for attempt in 1 2 3; do
          git stash push -- results.json 2>/dev/null || true
          git pull --rebase origin "$BRANCH" || { echo "Pull failed"; git rebase --abort 2>/dev/null; break; }
          git stash pop 2>/dev/null || true

          git checkout --theirs results.json 2>/dev/null || true
          git reset HEAD results.json 2>/dev/null
          git checkout -- results.json 2>/dev/null || true

          python _mirror-hub/scripts/merge_results.py results.json \
            --merge-url "$MERGE_URL" \
            --output results.json

          git add results.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update sync results (large-repos) [skip ci]"

          if git push origin "$BRANCH" 2>&1 | grep -q '[rejected]'; then
            echo "Push rejected, retrying..."
            git reset --soft HEAD~1
          else
            break
          fi
        done
