name: Openeuler gitcode large repos mirror periodic job test

on:
  workflow_dispatch:
  pull_request:
    # Runs at every pull requests submitted in master branch
    branches: [ master ]
    paths:
    - '.github/workflows/**'
  schedule:
    # Runs at 01:00 UTC (9:00 AM Beijing) every day
    - cron:  '0 1 * * *'

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      PIP_BREAK_SYSTEM_PACKAGES: "1"

    steps:
    - name: Checkout sync-config
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Mirror the gitcode/openeuler large org repos to github/openeuler-mirror.
      id: mirror
      continue-on-error: true
      uses: Yikun/hub-mirror-action@master
      with:
        src: gitcode/openeuler
        dst: github/openeuler-mirror
        dst_key: ${{ secrets.SYNC_EULER_PRIVATE_KEY }}
        dst_token: ${{ secrets.SYNC_EULER_TOKEN }}
        account_type: org
        clone_style: ssh
        force_update: true
        debug: true
        timeout: '1h'
        static_list: "kernel,qemu,raspberrypi,raspberrypi-kernel,website-v2"

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.x'

    - name: Check sync status
      id: status
      run: |
        pip install requests
        python scripts/check_sync_status.py \
          --src gitcode/openeuler \
          --dst github/openeuler-mirror \
          --dst-token "${{ secrets.SYNC_EULER_TOKEN }}" \
          --account-type org \
          --static-list "kernel,qemu,raspberrypi,raspberrypi-kernel,website-v2" \
          --workflow-name "large-repo-mirror" \
          --output mirror-results.json

    - name: Upload mirror results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: mirror-results-large-repo-mirror
        path: mirror-results.json
        retention-days: 30
